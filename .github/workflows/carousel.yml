name: 🌿 두피부 캐러셀 자동 생성

on:
  schedule:
    - cron: '0 0 * * 1'
    - cron: '0 0 * * 3'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 패키지 설치
        run: npm install

      - name: 📁 src 폴더 구성
        run: |
          mkdir -p src
          mv index.js src/ 2>/dev/null || true
          mv solar-terms.js src/ 2>/dev/null || true
          mv content-generator.js src/ 2>/dev/null || true
          mv figma-builder.js src/ 2>/dev/null || true

      - name: 🌿 캐러셀 자동 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node src/index.js --dry-run
          else
            node src/index.js
          fi

      - name: 📎 결과 파일 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carousel-${{ github.run_number }}
          path: output/
          retention-days: 7
